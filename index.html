<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disiplin Lab - Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBJLHrp81WM7Z2mMNfm9sGxu3HPC4paxEE",
            authDomain: "disiplintakibi.firebaseapp.com",
            projectId: "disiplintakibi",
            storageBucket: "disiplintakibi.firebasestorage.app",
            messagingSenderId: "888966592370",
            appId: "1:888966592370:web:cb5fa1c4803861c14d0feb"
        };

        // Compat modu ile başlatıyoruz (Hata payı sıfır)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DuoTracker = () => {
            const [data, setData] = React.useState(null);

            React.useEffect(() => {
                const unsub = db.collection("trackers").doc("main_sync").onSnapshot((doc) => {
                    if (doc.exists) {
                        setData(doc.data());
                    } else {
                        const initialState = {
                            profiles: {
                                userA: { name: 'Erdil Koçak' },
                                userB: { name: 'Berkin Konan' }
                            },
                            tasks: {
                                userA: { workout: [], nutrition: [] },
                                userB: { workout: [], nutrition: [], sigara: [] }
                            }
                        };
                        db.collection("trackers").doc("main_sync").set(initialState);
                    }
                });
                return () => unsub();
            }, []);

            const handlePhotoLink = async (uid, type) => {
                const url = prompt("Fotoğraf Linki:");
                if (!url) return;

                const newData = { ...data };
                newData.tasks[uid][type].push({
                    id: Date.now(),
                    url: url,
                    time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
                    date: new Date().toLocaleDateString('tr-TR')
                });
                await db.collection("trackers").doc("main_sync").update(newData);
            };

            if (!data) return <div className="min-h-screen bg-black flex items-center justify-center text-blue-500 font-bold uppercase tracking-tighter">Sistem Yükleniyor...</div>;

            const renderCard = (uid) => {
                const isBerkin = uid === 'userB';
                const categories = isBerkin ? ['workout', 'nutrition', 'sigara'] : ['workout', 'nutrition'];

                return (
                    <div className="bg-zinc-900/50 p-6 rounded-[2rem] border border-white/10 mb-6">
                        <h2 className="text-2xl font-black mb-6 text-white uppercase italic">{data.profiles[uid].name}</h2>
                        {categories.map(cat => (
                            <div key={cat} className="mb-6">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-500">
                                        {cat === 'workout' ? 'Antrenman' : cat === 'nutrition' ? 'Beslenme' : 'Sigara Takibi'}
                                    </h3>
                                    <button onClick={() => handlePhotoLink(uid, cat)} className="bg-white/5 p-2 rounded-lg hover:bg-white/10">
                                        <i data-lucide="plus" className="w-4 h-4 text-white"></i>
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {data.tasks[uid][cat]?.map(item => (
                                        <div key={item.id} className="relative group">
                                            <img src={item.url} className="w-full h-24 object-cover rounded-xl border border-white/5 shadow-lg" />
                                            <div className="flex justify-between text-[8px] mt-1 text-zinc-600 font-bold">
                                                <span>{item.date}</span>
                                                <span className="bg-white/5 px-1 rounded">{item.time}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#050505] text-white py-12 px-4">
                    <header className="text-center mb-16">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter">Discipline <span className="text-blue-600 underline">Sync</span></h1>
                        <p className="text-[10px] text-zinc-500 mt-2 tracking-[0.5em] font-bold uppercase">Cloud Connection Stable</p>
                    </header>
                    <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
                        {renderCard('userA')}
                        {renderCard('userB')}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DuoTracker />);
        setTimeout(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
