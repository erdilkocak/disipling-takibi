<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disiplin Lab - Pro Sync v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBJLHrp81WM7Z2mMNfm9sGxu3HPC4paxEE",
            authDomain: "disiplintakibi.firebaseapp.com",
            projectId: "disiplintakibi",
            storageBucket: "disiplintakibi.firebasestorage.app",
            messagingSenderId: "888966592370",
            appId: "1:888966592370:web:cb5fa1c4803861c14d0feb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DuoTracker = () => {
            const [profiles, setProfiles] = React.useState({
                userA: { name: 'Erdil Koçak', avatar: null },
                userB: { name: 'Berkin Konan', avatar: null }
            });
            const [tasks, setTasks] = React.useState({
                userA: { workout: [], nutrition: [] },
                userB: { workout: [], nutrition: [], sigara: [] }
            });

            React.useEffect(() => {
                // Profil bilgilerini çek
                const unsubProfiles = db.collection("config").doc("profiles").onSnapshot((doc) => {
                    if (doc.exists) setProfiles(doc.data());
                });

                // Fotoğrafları gerçek zamanlı izle (Tarihe göre sıralı)
                const unsubTasks = db.collection("all_tasks").orderBy("id", "desc").onSnapshot((snapshot) => {
                    const newTasks = {
                        userA: { workout: [], nutrition: [] },
                        userB: { workout: [], nutrition: [], sigara: [] }
                    };
                    snapshot.docs.forEach(doc => {
                        const item = doc.data();
                        if (newTasks[item.uid] && newTasks[item.uid][item.type]) {
                            newTasks[item.uid][item.type].push({...item, docId: doc.id});
                        }
                    });
                    setTasks(newTasks);
                });

                return () => { unsubProfiles(); unsubTasks(); };
            }, []);

            const processImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 300; // Boyutu biraz daha küçülttük ki hızlı yüklensin
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                });
            };

            const handleFileUpload = async (uid, type, file) => {
                if (!file) return;
                const base64Image = await processImage(file);
                
                if (type === 'avatar') {
                    const newProfiles = { ...profiles };
                    newProfiles[uid].avatar = base64Image;
                    await db.collection("config").doc("profiles").set(newProfiles);
                } else {
                    // Her fotoğrafı ayrı bir doküman olarak kaydet (Sınır yok!)
                    await db.collection("all_tasks").add({
                        uid,
                        type,
                        url: base64Image,
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
                        date: new Date().toLocaleDateString('tr-TR')
                    });
                }
            };

            const deleteItem = async (docId) => {
                await db.collection("all_tasks").doc(docId).delete();
            };

            const renderCard = (uid) => {
                const profile = profiles[uid];
                const userTasks = tasks[uid];
                const isBerkin = uid === 'userB';
                const categories = isBerkin ? ['workout', 'nutrition', 'sigara'] : ['workout', 'nutrition'];

                return (
                    <div className="bg-zinc-900/60 p-6 rounded-[2.5rem] border border-white/10 mb-8 backdrop-blur-xl shadow-2xl">
                        <div className="flex items-center gap-4 mb-10">
                            <label className="relative w-20 h-20 rounded-full overflow-hidden border-2 border-blue-500/40 cursor-pointer shadow-blue-900/20 shadow-xl">
                                {profile.avatar ? 
                                    <img src={profile.avatar} className="w-full h-full object-cover" /> : 
                                    <div className="w-full h-full bg-zinc-800 flex items-center justify-center font-black text-2xl text-zinc-600">{profile.name[0]}</div>
                                }
                                <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(uid, 'avatar', e.target.files[0])} />
                            </label>
                            <div>
                                <h2 className="text-2xl font-black text-white italic uppercase tracking-tighter leading-none">{profile.name}</h2>
                                <p className="text-[10px] text-blue-500 font-bold tracking-[0.4em] uppercase mt-2">Discipline Partner</p>
                            </div>
                        </div>

                        {categories.map(cat => (
                            <div key={cat} className="mb-10 last:mb-0">
                                <div className="flex justify-between items-center mb-4 px-2">
                                    <h3 className="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500">
                                        {cat === 'workout' ? 'Antrenman' : cat === 'nutrition' ? 'Beslenme' : 'Sigara Takibi'}
                                    </h3>
                                    <label className="cursor-pointer bg-blue-600/10 p-2 rounded-xl hover:bg-blue-600/20 border border-blue-600/20 transition-all">
                                        <i data-lucide="plus" className="w-5 h-5 text-blue-400"></i>
                                        <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(uid, cat, e.target.files[0])} />
                                    </label>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {userTasks[cat]?.map(item => (
                                        <div key={item.docId} className="relative group overflow-hidden rounded-3xl border border-white/5 bg-zinc-800/30 p-1">
                                            <img src={item.url} className="w-full h-32 object-cover rounded-[1.2rem]" />
                                            <button onClick={() => deleteItem(item.docId)} className="absolute top-3 right-3 bg-red-600/80 p-2 rounded-xl backdrop-blur-md opacity-0 group-hover:opacity-100 transition-all">
                                                <i data-lucide="trash-2" className="w-4 h-4 text-white"></i>
                                            </button>
                                            <div className="p-2 flex justify-between text-[9px] font-bold text-zinc-500 uppercase tracking-tight">
                                                <span>{item.date}</span>
                                                <span className="text-zinc-400">{item.time}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#050505] text-white py-16 px-4 selection:bg-blue-600/30">
                    <header className="max-w-4xl mx-auto text-center mb-16">
                        <h1 className="text-6xl font-black italic uppercase tracking-tighter mb-4">Discipline <span className="text-blue-600 underline decoration-4">Sync</span></h1>
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-zinc-900 border border-white/5 shadow-inner">
                            <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <p className="text-[10px] text-zinc-400 tracking-[0.3em] font-black uppercase">Cloud Database Active</p>
                        </div>
                    </header>
                    <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-10">
                        {renderCard('userA')}
                        {renderCard('userB')}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DuoTracker />);
        setTimeout(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
