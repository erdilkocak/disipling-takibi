<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disiplin Lab - Sync Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBJLHrp81WM7Z2mMNfm9sGxu3HPC4paxEE",
            authDomain: "disiplintakibi.firebaseapp.com",
            projectId: "disiplintakibi",
            storageBucket: "disiplintakibi.firebasestorage.app",
            messagingSenderId: "888966592370",
            appId: "1:888966592370:web:cb5fa1c4803861c14d0feb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DuoTracker = () => {
            const [data, setData] = React.useState(null);

            React.useEffect(() => {
                const unsub = db.collection("trackers").doc("main_sync").onSnapshot((doc) => {
                    if (doc.exists) {
                        setData(doc.data());
                    } else {
                        const initialState = {
                            profiles: {
                                userA: { name: 'Erdil Koçak', avatar: null },
                                userB: { name: 'Berkin Konan', avatar: null }
                            },
                            tasks: {
                                userA: { workout: [], nutrition: [] },
                                userB: { workout: [], nutrition: [], sigara: [] }
                            }
                        };
                        db.collection("trackers").doc("main_sync").set(initialState);
                    }
                });
                return () => unsub();
            }, []);

            // Fotoğrafı küçültme ve metne (Base64) çevirme fonksiyonu
            const processImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 400; // Dosya boyutunu düşük tutmak için
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.7)); // %70 kalite
                        };
                    };
                });
            };

            const handleFileUpload = async (uid, type, file) => {
                if (!file) return;
                const base64Image = await processImage(file);
                
                const newData = { ...data };
                if (type === 'avatar') {
                    newData.profiles[uid].avatar = base64Image;
                } else {
                    newData.tasks[uid][type].push({
                        id: Date.now(),
                        url: base64Image,
                        time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
                        date: new Date().toLocaleDateString('tr-TR')
                    });
                }
                await db.collection("trackers").doc("main_sync").update(newData);
            };

            const deleteItem = async (uid, type, id) => {
                const newData = { ...data };
                newData.tasks[uid][type] = newData.tasks[uid][type].filter(item => item.id !== id);
                await db.collection("trackers").doc("main_sync").update(newData);
            };

            if (!data) return <div className="min-h-screen bg-black flex items-center justify-center text-blue-500 font-bold uppercase tracking-widest animate-pulse">Senkronize Ediliyor...</div>;

            const renderCard = (uid) => {
                const profile = data.profiles[uid];
                const tasks = data.tasks[uid];
                const isBerkin = uid === 'userB';
                const categories = isBerkin ? ['workout', 'nutrition', 'sigara'] : ['workout', 'nutrition'];

                return (
                    <div className="bg-zinc-900/40 p-6 rounded-[2.5rem] border border-white/10 mb-8 backdrop-blur-md">
                        <div className="flex items-center gap-4 mb-8">
                            <label className="relative w-16 h-16 rounded-full overflow-hidden border-2 border-blue-500/30 cursor-pointer hover:scale-105 transition-transform">
                                {profile.avatar ? 
                                    <img src={profile.avatar} className="w-full h-full object-cover" /> : 
                                    <div className="w-full h-full bg-zinc-800 flex items-center justify-center font-black text-xl text-zinc-500">{profile.name[0]}</div>
                                }
                                <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(uid, 'avatar', e.target.files[0])} />
                            </label>
                            <div>
                                <h2 className="text-xl font-black text-white italic uppercase tracking-tighter">{profile.name}</h2>
                                <p className="text-[9px] text-blue-500 font-bold tracking-[0.3em] uppercase">Adaşim</p>
                            </div>
                        </div>

                        {categories.map(cat => (
                            <div key={cat} className="mb-8 last:mb-0">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">
                                        {cat === 'workout' ? 'Antrenman' : cat === 'nutrition' ? 'Beslenme' : 'Sigara Takibi'}
                                    </h3>
                                    <label className="cursor-pointer bg-white/5 p-2 rounded-xl hover:bg-blue-600/20 transition-colors border border-white/10">
                                        <i data-lucide="plus" className="w-5 h-5 text-white"></i>
                                        <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(uid, cat, e.target.files[0])} />
                                    </label>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {tasks[cat]?.map(item => (
                                        <div key={item.id} className="relative group overflow-hidden rounded-2xl border border-white/5">
                                            <img src={item.url} className="w-full h-28 object-cover transition-transform group-hover:scale-110" />
                                            <button onClick={() => deleteItem(uid, cat, item.id)} className="absolute top-2 right-2 bg-black/60 p-1.5 rounded-lg backdrop-blur-md opacity-0 group-hover:opacity-100 transition-opacity">
                                                <i data-lucide="trash-2" className="w-3 h-3 text-red-500"></i>
                                            </button>
                                            <div className="absolute bottom-0 left-0 right-0 bg-black/60 backdrop-blur-sm p-1.5 flex justify-between text-[8px] font-bold text-zinc-300">
                                                <span>{item.date}</span>
                                                <span>{item.time}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#050505] text-white py-12 px-4 selection:bg-blue-500/30">
                    <header className="max-w-4xl mx-auto text-center mb-16">
                        <h1 className="text-5xl font-black italic uppercase tracking-tighter mb-2">CEZA 500 <span className="text-blue-600 underline">TL</span></h1>
                        <div className="inline-block px-4 py-1 rounded-full bg-blue-600/10 border border-blue-600/20">
                            <p className="text-[10px] text-blue-500 tracking-[0.4em] font-bold uppercase">Yine dene yine yenil</p>
                        </div>
                    </header>
                    <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
                        {renderCard('userA')}
                        {renderCard('userB')}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DuoTracker />);
        setTimeout(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
